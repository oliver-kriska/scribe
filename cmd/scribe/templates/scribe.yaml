# scribe.yaml — KB configuration
# Written by `scribe init`. Edit by hand; re-run `scribe init --check` any time.

# Owner context loaded into ~/.claude/CLAUDE.md so every Claude Code session
# knows who you are and how to address your work.
owner_name: "{{.OwnerName}}"
owner_context: |
{{.OwnerContextIndented}}

# Domains this KB uses for the `domain:` frontmatter field. Validator rejects
# domains not in this list. `personal` and `general` are always accepted on top.
domains:
{{range .Domains}}  - {{.}}
{{end}}
# Owners route quality findings (stale articles, contradictions, conflict
# markers) to a named person per domain in the team digest (`scribe digest`).
# Coarse on purpose — a name per domain, not per-file CODEOWNERS, because
# fine-grained ownership maps rot. Names should match each member's
# `contributor:` identity. Unowned domains are listed in the digest.
# owners:
#   backend: "Alice"
#   infra: "Bob"

{{if .TeamMode}}# Shared team KB. This activates the config trust layer: sensitive keys
# in this file (sources, capture, ingestion dirs, ollama_url) are locked
# to a per-machine approved snapshot — when a pushed change alters them,
# each member's scribe keeps running on the values they trusted and asks
# them to review (`scribe config diff` / `scribe config trust`). iMessage
# capture never runs from this file in team mode; enable it per-person in
# the gitignored scribe.local.yaml if wanted.
team: true

{{end}}# Per-user overrides live in scribe.local.yaml (gitignored) — same schema
# as this file, values there always win. That's where personal capture
# handles or extra source filters belong in a shared KB.

# Secret scan — team-mode credential gate. Staged articles containing
# real-shaped tokens (AWS/GitHub/Anthropic/OpenAI keys, PEM blocks,
# passwords in URLs, …) are held back from commit with a loud log line;
# doctor lists anything still on disk. The matched value is never
# printed. Add `scribe:allow` on a line to mark a placeholder.
# Trust-locked: a pushed change here can't weaken another member's gate.
# secret_scan:
#   disable: false
#   generic: false        # noisy generic key=value rule, entropy-gated
#   allow_paths: []       # KB-relative globs to exempt, e.g. wiki/examples

# Stop words — your own commit gate, on top of the credential scanner
# and active for solo KBs too. Two modes, matched WHOLE-WORD and
# case-insensitively by default (wrap an entry in /slashes/ for a regex):
#   hold:  a staged article containing the word is held back from commit
#          (stays local, never silently dropped) — for client names, NDA
#          codenames, anything that must not enter the KB.
#   mask:  every occurrence is redacted in place and the article still
#          commits — keep the doc, lose one noun.
# Add `scribe:allow` on a line to exempt it. The shared list here is team
# policy; keep PERSONAL words out of this committed file and in
# ~/.config/scribe/config.yaml under the same `stop_words:` key — the two
# lists union, and the personal half never leaves your machine.
# stop_words:
#   hold:
#     - AcmeCorp
#     - "/codename-\\d+/"
#   mask:
#     - internal-tool-name
#   redaction: "[redacted]"

# Subscriptions surface teammates' incoming articles after each pull —
# matches print to the sync log; notify: true also fires a macOS
# notification. Personal preference, so set it in scribe.local.yaml:
# subscriptions:
#   domains: [backend]
#   tags: [auth, perf]
#   notify: true

# Source filters — which project paths discovery may enroll. Evaluated
# before a project ever lands in the manifest; projects already tracked
# are managed via `scribe projects`. Patterns: a plain path covers
# everything beneath it; globs (~/work-*) match the path or any of its
# ancestors; exclude always wins over include. Empty include = allow all.
#
# allowed_remotes filters by git identity instead of path: when set,
# only repos whose origin remote matches an entry (any spelling —
# https://, git@host:, or bare host/org) are discovered, and repos
# WITHOUT an origin remote are rejected. The team-KB guard: members
# keep checkouts wherever they like, but only org repos enroll.
{{if or .SourcesInclude .SourcesExclude}}sources:
{{if .SourcesInclude}}  include:
{{range .SourcesInclude}}    - "{{.}}"
{{end}}{{end}}{{if .SourcesExclude}}  exclude:
{{range .SourcesExclude}}    - "{{.}}"
{{end}}{{end}}{{else}}# sources:
#   include:
#     - ~/work
#     - ~/Projects/client-*
#   exclude:
#     - ~/Projects/personal
#   allowed_remotes:
#     - github.com/myorg
{{end}}
# Per-KB scheduler cadence (issue #26). The machine's cron agents run
# `scribe each`, which ticks every job in every registered KB. A cadence
# entry makes THIS KB skip a job when its last ok run (output/runs/*.jsonl)
# is younger than the interval — so the shared agents can fire often while
# each KB paces itself, without per-KB launchd schedules. Empty = run every
# tick (the default). Keys are the command plus its first --flag (a bare
# command covers all its modes as a fallback); values are Go durations
# ("2h", "30m") or a day count ("7d").
# each:
#   cadence:
#     "sync --sessions": 6h
#     dream: 7d
#     "capture --fetch": 4h

# Paths
claude_projects_dir: ~/.claude/projects
# Codex CLI rollouts (~/.codex/sessions/YYYY/MM/DD/rollout-*.jsonl). Scanned
# by `scribe sync --discover` so projects you've touched only from Codex
# also land in the manifest. Optional — missing dir is a WARN in doctor,
# not a failure.
codex_sessions_dir: ~/.codex/sessions
ccrider_db: ~/.config/ccrider/sessions.db
lock_dir: /tmp

# Default model for extraction / absorb claude -p calls
default_model: sonnet

# Top-level LLM routing (Phase 4A.5). Every per-op LLM call inherits
# from this block when its own provider/model fields are empty. Flip
# `llm.provider: ollama` and `llm.model: qwen2.5-coder:14b` here to
# move the *entire* pipeline onto the local Ollama server with a single
# line — no per-op edits needed. Per-op overrides still win when set.
llm:
  provider: {{.LLMProvider}}
  model: "{{.LLMModel}}"
  ollama_url: http://localhost:11434
{{if eq .LLMProvider "ollama"}}
# This KB was bootstrapped with --provider ollama. Every LLM op runs
# against the local server. Per-op overrides (e.g. keep pass-2 on
# Anthropic) still work — just set the per-op provider explicitly.
{{else}}
# 100%-Ollama setup (replace the block above):
#   llm:
#     provider: ollama
#     model: qwen2.5-coder:14b       # general-purpose; gemma3:4b for cheap passes
#     ollama_url: http://localhost:11434
# Then verify with `scribe doctor` — it'll probe the Ollama server.
{{end}}
# Hosted OpenAI-compatible providers (Together / Groq / Fireworks / HF /
# any /v1/chat/completions endpoint). The middle ground between local
# Ollama and Anthropic: run the SAME open models scribe defaults to
# (qwen3-30b-a3b, gemma3-12b, …) on someone else's GPU for a few dollars
# a month — no local 12B–30B hardware floor. Per-op pinning means you can
# route ONLY the heavy absorb pass to the cloud and keep the rest local.
#
#   PRIVACY: a hosted provider sends your KB content (notes, decisions,
#   source context) to a third party on every call. Local/anthropic stay
#   the defaults — cloud routing is opt-in and explicit, per the block
#   below. Expect ~$2–6/month for a busy KB (~89% of tokens are cheap
#   input). The API key is read from an ENV VAR, never from this file.
#
#   llm:
#     provider: groq                 # together | groq | fireworks | huggingface | openai-compat
#     model: qwen3-32b               # a real hosted model id — NOT a Claude alias
#     # base_url:  only for provider: openai-compat (named providers have built-in URLs)
#     # api_key_env: GROQ_API_KEY    # default per provider; SCRIBE_LLM_API_KEY is a generic fallback
#
# The API key never goes in THIS file (it could be committed to a shared
# KB). Put it in the per-machine user config instead — picked up by both
# interactive runs and the cron LaunchAgent with no shell setup:
#   ~/.config/scribe/config.yaml:  llm_api_key: tok-xxxx   (chmod 600)
# …or export an env var for a one-off run (overrides the file):
#   export GROQ_API_KEY=...          # TOGETHER_API_KEY / FIREWORKS_API_KEY / HF_TOKEN per provider
#
# Optional: per-model USD-per-1M-token rates so `scribe cost` reports
# dollars (rates drift, so they live here, not in code). Keys match the
# `model` column in `scribe cost` (provider/model); a bare model also works.
#   llm:
#     pricing:
#       "groq/qwen3-32b": { input: 0.29, output: 0.59 }
#       "together/qwen3-30b-a3b": { input: 0.10, output: 0.30 }
#
# IMPORTANT: set sync.daily_output_token_ceiling below before pointing at
# a paid provider — it's the runaway-spend backstop (see that block).

sync:
  max_extractions: 3
  max_sessions: 3
  max_absorb: 5
  parallel_extractions: 3
  checkpoint_interval: 5
  # auto_approve: newly discovered projects normally land as "pending"
  # and wait for `scribe projects review` before anything is extracted,
  # collected, or mined from them (the mise/direnv trust model — new
  # sources need a nod first). Set true to enroll every discovered
  # project immediately, like scribe did before 0.2.30.
  # auto_approve: false

  # commit_debounce_minutes: suppresses auto-commit+push when the last KB
  # commit was less than this many minutes ago. Useful on busy cron
  # cadences (5min ingests → many tiny commits). Staged changes roll over
  # to the next run. Default 0 = commit every run.
  # commit_debounce_minutes: 30

  # always_pull_before_sync: runs `git pull --rebase --autostash` at the
  # start of `scribe sync` so teammates' committed pages appear in this
  # run before extraction/absorb. Silent no-op if the KB isn't a git
  # repo or has no remote. Failures (offline, auth, conflict) are
  # non-fatal — sync continues. Default: true. Flip to false on air-
  # gapped / offline laptops.
  # always_pull_before_sync: true

  # daily_output_token_ceiling: hard backstop against runaway spend on
  # ANY metered provider — anthropic AND hosted OpenAI-compatible
  # providers (together/groq/fireworks/huggingface/openai-compat). When
  # today's metered output_tokens cross this number, further metered
  # calls abort with ErrDailyBudgetExhausted; sync's outer loop logs and
  # exits 0 so cron doesn't crashloop. Local Ollama calls are exempt
  # (free). SCRIBE_BYPASS_BUDGET=1 bypasses for one-off manual runs. Zero
  # (default) disables the ceiling. After the 2026-05-11 runaway (~7M
  # output tokens in 35h) a sensible production value is ~2_000_000.
  # daily_output_token_ceiling: 0
  #
  # Legacy alias (anthropic-only name, still honored; prefer the
  # generalized key above). When both are set, the generalized one wins.
  # daily_anthropic_output_token_ceiling: 0
  #
  # This ceiling caps THIS KB only. If you run several KBs on one machine
  # they share one API key and one bill, so also set a MACHINE-level
  # ceiling in ~/.config/scribe/config.yaml (issue #26):
  #   daily_output_token_ceiling: 4000000   # summed across every registered KB
  # whichever ceiling (per-KB or machine) is hit first aborts the call.

deep:
  batch_max: 5

# Identity harvesting filters for `scribe lint --identities`. Defaults
# cover common Elixir module attributes (@doc, @behaviour, @moduletag)
# and test email domains (example.com). Your entries ADD to the defaults
# — they don't replace them. Write the bare token (no leading @).
# identities:
#   handle_stopwords:
#     - my_custom_attr
#     - another_noise_handle
#   email_domain_stopwords:
#     - internal-company-test.example

# Absorb pipeline: raw/articles/*.md → wiki pages.
# Leave a field unset to inherit the default (shown in comments below).
absorb:
  # Which raw articles auto-absorb during sync.
  #   high   = only articles with `absorb: true` in frontmatter or a named
  #            (non-"general") domain tag
  #   medium = all unabsorbed raw articles (default)
  #   low    = same as medium, reserved for future relaxations
  strictness: medium              # default: medium
  max_per_run: 5                  # default: 5

  # Density classification thresholds. A raw article becomes:
  #   brief    when word_count <  brief_threshold_words  AND heading_count <= brief_threshold_headings
  #   dense    when word_count >= dense_threshold_words  OR  heading_count >= dense_threshold_headings
  #   standard otherwise
  # Dense sources use the two-pass (entity-first) absorb path.
  dense_threshold_words: 2000     # default: 2000
  dense_threshold_headings: 4     # default: 4
  brief_threshold_words: 500      # default: 500
  brief_threshold_headings: 1     # default: 1

  # Models and timeouts for each absorb path.
  pass1_model: haiku              # default: haiku (cheap entity-list pass)
  pass2_model: ""                 # default: "" = inherit sync default_model
  pass1_timeout_min: 5            # default: 5
  pass2_timeout_min: 5            # default: 5
  pass2_parallel: 3               # default: 3 (chapters per pass2 run; drop to 1 for slow local models)
  single_pass_timeout_min: 5      # default: 5

  # Phase 3B atomic-fact extraction. Off by default — opt in once
  # chaptered absorb is verified on your corpus.
  # atomic_facts: true
  # facts_model: haiku              # default: haiku (for ollama: e.g. gemma3:4b)
  # facts_timeout_min: 3            # default: 3
  #
  # facts_provider routes the per-chunk facts pass through the same
  # provider abstraction as contextualize. The pass is text-in/JSON-out
  # (no tools), which suits a 4-7B local model. Anthropic stays the
  # default; flip to ollama to keep this cheap-but-numerous pass off
  # Anthropic quota. ollama_url comes from absorb.contextualize below.
  # facts_provider: anthropic       # default: anthropic (alternatives: ollama)

  # Phase 4B pass-2 JSON-envelope mode. The default "tools" path uses
  # `claude -p` with Read/Write/Edit/Glob/Grep. Setting pass2_mode=json
  # (or pass2_provider to a non-anthropic provider) switches pass-2 to
  # an inlined prompt that emits one WikiActionEnvelope JSON document;
  # scribe applies the file mutations itself. This makes pass-2 work
  # against local Ollama models (no tool-use needed).
  # pass2_mode: tools               # default: tools (alternatives: json)
  # pass2_provider: anthropic       # default: anthropic (alternatives: ollama)
  # pass2_model: ""                 # for ollama: e.g. qwen2.5-coder:14b

  # Contextualize step: inserts a retrieval-context paragraph into each raw
  # article before qmd embedding (Anthropic Contextual Retrieval pattern).
  # Idempotent via wiki/_contextualized_log.json.
  #
  # provider:
  #   anthropic — `claude -p` (Haiku ≈ $0.0001/doc). Default.
  #   ollama    — local Ollama HTTP server. Free, offline.
  #               Requires only `brew install ollama`. scribe auto-detects
  #               the server and auto-pulls the model on first use.
  # model (when provider=ollama), recommended Apr 2026:
  #   gemma3:4b      — 3.3 GB, best speed/quality balance (default pick)
  #   qwen3:4b       — richer prose, slightly more verbose
  #   llama3.2:3b    — smaller, older-generation
  #   phi4-mini:3.8b — reasoning-heavy
  contextualize:
    enabled: true                 # default: true
{{if eq .LLMProvider "ollama"}}    provider: ollama              # follows the --provider ollama bootstrap choice
    model: gemma3:4b              # scribe-vetted local default for this pass
{{else}}    provider: anthropic           # default: anthropic (alt: ollama)
    model: haiku                  # default: haiku (ollama: e.g. gemma3:4b)
{{end}}    ollama_url: http://localhost:11434
    max_per_run: 20               # default: 20
    timeout_sec: 90               # default: 90

capture:
  # iMessage handles used by self-chat URL capture. Each handle maps to a
  # distinct chat in chat.db — most accounts have at least two: a phone
  # number and an Apple ID email. List them all here, or capture will
  # silently skip messages sent to the non-listed chat.
  # Override per-run via SCRIBE_SELF_CHAT_ID="phone,email" (comma-separated).
  self_chat_handles:
    - "{{.SelfChatHandle}}"

# Triage keyword categories for `scribe triage` (BM25 FTS5 scoring).
# Edit any MATCH expression to tune to your stack. Weights multiply per hit.
triage:
  keywords:
    decision: "decided OR chose OR tradeoff OR alternative"
    architecture: "architecture OR \"design pattern\" OR strategy OR refactor"
    research: "research OR paper OR benchmark OR measured OR compared"
    learning: "learned OR realized OR mistake OR lesson OR insight"
    evaluation: "evaluated OR verdict OR recommend OR comparison"
    deep_work: "analysis OR investigation OR \"root cause\" OR audit"
    code_pattern: "{{.CodePatternKeywords}}"
  weights:
    decision: 3
    architecture: 2
    research: 3
    learning: 2
    evaluation: 2
    deep_work: 1
    code_pattern: 1

# Priority lanes for the pending-session queue (scored, not FIFO). A
# session scoring at or above hot_threshold mines before Normal-lane
# sessions; age_days promotes a stale Normal entry into Hot so it can't
# be starved forever by a steady stream of higher scorers. Defaults
# below match the built-in fallback — uncomment only to tune.
# priority_lanes:
#   hot_threshold: 90              # default: 90
#   age_days: 7                    # default: 7
