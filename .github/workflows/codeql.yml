# CodeQL — GitHub's SAST engine, run over the Go source.
#
# Go's CodeQL extractor requires a real build (build-mode: none is not
# supported for Go), so this uses build-mode: manual and drives the
# project's own `make build` — CGO_ENABLED=1 with the sqlite_fts5 tag, the
# same compile CI already runs green. CodeQL traces that build to extract
# the database. Results land in the code-scanning tab and satisfy the OSSF
# Scorecard SAST check.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "45 6 * * 1" # weekly, Monday 06:45 UTC (just after scorecard)

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      # Upload analysis results to the code-scanning dashboard.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: go
          build-mode: manual

      - name: Build (CGO + sqlite_fts5, mirrors the release compile)
        run: make build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"
