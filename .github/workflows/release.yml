# Release pipeline for scribe.
#
# Runs GoReleaser under the goreleaser-cross docker image, which ships the
# C toolchains for darwin amd64/arm64 and linux amd64/arm64 needed because
# scribe links go-sqlite3 (CGO + sqlite_fts5 build tag). Cross-compiling
# CGO from a single host otherwise fails at the linker.
#
# Triggered on tag push. Requires:
#   - HOMEBREW_TAP_GITHUB_TOKEN repo secret (PAT with repo:write on
#     oliver-kriska/homebrew-scribe)  — used by goreleaser to publish the
#     formula update.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    # Manual trigger to backfill a release for an existing tag when the
    # automatic push trigger was suppressed (e.g. >3 tags pushed at once).
    # Run from main with the tag as input:
    #   gh workflow run release.yml --ref main -f tag=vX.Y.Z
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.7)"
        required: true

# Read-only at the top level (Scorecard Token-Permissions). The write
# scopes below are granted only to the one job that needs them.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # GoReleaser creates the GitHub release and uploads the artifacts.
      contents: write
      # Keyless cosign signing: the OIDC token proves this workflow (not a
      # stolen key) produced the signature on checksums.txt.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      # goreleaser-cross bundles cosign but NOT syft. Install a pinned,
      # checksum-verified syft on the runner and mount it into the
      # container (static Go binary — runs fine in the debian image).
      - name: Install syft v1.45.1 (SBOM generation)
        run: |
          curl -sSfLO https://github.com/anchore/syft/releases/download/v1.45.1/syft_1.45.1_linux_amd64.tar.gz
          curl -sSfLO https://github.com/anchore/syft/releases/download/v1.45.1/syft_1.45.1_checksums.txt
          grep ' syft_1.45.1_linux_amd64.tar.gz$' syft_1.45.1_checksums.txt | sha256sum -c -
          tar -xzf syft_1.45.1_linux_amd64.tar.gz syft
          sudo install syft /usr/local/bin/syft
          rm -f syft syft_1.45.1_linux_amd64.tar.gz syft_1.45.1_checksums.txt

      - name: Run GoReleaser in cross-compile container
        # The image base is Go 1.26.2 (goreleaser-cross has no newer tag
        # yet). GOTOOLCHAIN=auto makes the in-container build honor the
        # `go 1.26.5` directive in go.mod by fetching that toolchain, so the
        # release binary is built against the patched stdlib regardless of
        # the image's base Go. Bump the image tag to a >=1.26.5 base once one
        # ships and the download step goes away.
        #
        # Image pinned by DIGEST (= tag v1.26.2-3): this container runs
        # with the Homebrew-tap PAT in its env, so a repointed tag would
        # be a formula-compromise vector. To bump, resolve the new tag:
        #   TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:goreleaser/goreleaser-cross:pull" | jq -r .token)
        #   curl -sI -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.oci.image.index.v1+json" \
        #     https://ghcr.io/v2/goreleaser/goreleaser-cross/manifests/<TAG> | grep -i docker-content-digest
        run: |
          docker run --rm \
            -v "$PWD":/go/src/github.com/oliver-kriska/scribe \
            -v /usr/local/bin/syft:/usr/local/bin/syft:ro \
            -w /go/src/github.com/oliver-kriska/scribe \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_GITHUB_TOKEN \
            -e GOTOOLCHAIN=auto \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            ghcr.io/goreleaser/goreleaser-cross@sha256:bd51e63c1432305eb0309cdf3bff11e5ae6419cefb10839fea3e705f3e5d57da \
            release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
