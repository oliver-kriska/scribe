# goreleaser config for scribe.
#
# CGO is required because scribe depends on go-sqlite3 with the FTS5 build
# tag. Cross-compiling CGO from a single host fails at the linker, so the
# release pipeline (`.github/workflows/release.yml`) runs goreleaser inside
# the `ghcr.io/goreleaser/goreleaser-cross` image, which ships the darwin
# and linux C toolchains needed for all four target (GOOS, GOARCH) combos.
#
# Publish (inside the cross image — see the workflow):
#   goreleaser release --clean
#
# Dry-run locally on a single host (native builds only, no publish):
#   goreleaser release --snapshot --clean --skip=publish,sign

version: 2

project_name: scribe

before:
  hooks:
    - go mod tidy

builds:
  - id: scribe
    main: ./cmd/scribe
    binary: scribe
    env:
      - CGO_ENABLED=1
    flags:
      - -tags=sqlite_fts5
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # Per-target cross-compiler selection. goreleaser-cross ships all four
    # C toolchains; without these overrides go build falls back to the host
    # `gcc` which can't assemble arm64.
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
          - CXX=o64-clang++
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*
      - install.sh

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: scribe
    repository:
      owner: oliver-kriska
      name: homebrew-scribe
      # Without this, goreleaser uses the workflow's GITHUB_TOKEN which is
      # scoped only to the scribe repo and gets 403 on the tap.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/oliver-kriska/scribe"
    description: "LLM-managed personal knowledge base tooling"
    license: MIT
    dependencies:
      - name: git
      - name: sqlite
      # Tap-qualified name: goreleaser renders this as
      #   depends_on "neilberkman/tap/ccrider"
      # so `brew install oliver-kriska/scribe/scribe` auto-taps neilberkman's
      # tap and pulls ccrider too. Honza's install hit a [FAIL] wall on
      # ccrider before this was declared.
      - name: neilberkman/tap/ccrider
    caveats: |
      Runtime dependencies not on Homebrew — install these separately:
        * claude     (Claude Code CLI)
                     curl -fsSL https://claude.ai/install.sh | bash
        * qmd        (semantic search over the KB)
                     npm install -g @tobilu/qmd
        * trafilatura (optional, URL → markdown)
                     pipx install trafilatura
        * jq, fzf    (optional)
                     brew install jq fzf

      Already installed by brew as dependencies: git, sqlite, ccrider.

      After installing:
        scribe init --path ~/my-kb
        scribe cron install           # macOS: LaunchAgents
                                      # Linux: prints crontab lines

      macOS — Full Disk Access for `scribe capture` (iMessage):
        scribe fda                    # opens the FDA pane and walks you through
                                      # drag-and-drop from Finder is the most
                                      # reliable method on macOS 14+

      Heads-up: until scribe ships with Developer ID codesigning, the FDA
      grant is tied to the Cellar path + binary cdhash, which both change
      on every `brew upgrade scribe`. After an upgrade, `scribe capture`
      will start failing with "operation not permitted" — just re-run
      `scribe fda`. `scribe doctor` flags this situation explicitly.
    install: |
      bin.install "scribe"
    # custom_block is injected verbatim into the generated Formula. We use
    # it to add a post_install hook that runs on every install AND upgrade
    # (brew skips caveats on upgrade, so the re-grant nudge would otherwise
    # reach only fresh installers).
    custom_block: |
      def post_install
        return unless OS.mac?
        ohai "Homebrew upgraded scribe."
        ohai "If iMessage capture was working before, macOS Full Disk Access"
        ohai "is now invalidated (TCC is keyed to the binary cdhash, not the"
        ohai "install path). Re-run:  scribe fda"
      end
    test: |
      assert_match "scribe", shell_output("#{bin}/scribe --help 2>&1")
